version: '3.8'

services:
  mysql:
    image: mysql:8
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ttai
      MYSQL_USER: ttai
      MYSQL_PASSWORD: ttai_dev_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage

  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - '3001:3000'
    environment:
      DATABASE_URL: mysql://root:root_password@mysql:3306/langfuse
      NEXTAUTH_SECRET: langfuse-dev-secret-change-in-prod
      NEXTAUTH_URL: http://localhost:3001
      SALT: langfuse-dev-salt-change-in-prod
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
